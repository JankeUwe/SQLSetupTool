# =============================================================================
# Domain-Profil: DEFAULT
# Wird verwendet wenn keine spezifische Domain erkannt wird.
# =============================================================================

[Profile]
DisplayName = Standard (kein Domain-Match)

[Collation]
Default = Latin1_General_CI_AS

[SysadminGroups]
# Kommagetrennte AD-Gruppen die nach Installation zur sysadmin-Rolle hinzugefuegt werden.
# Leer = keine automatische Zuweisung.
Groups =

[Monitoring]
# 0-basierter Index in die Monitoring-Typen-Liste (settings.ini [Monitoring] Types)
Type = 1

[DiskLayout]
DataDrive    = G
LogDrive     = H
TempDrive    = I
BackupDrive  = F
InstallDrive = C

[ZielServer]
# Zielpfad auf dem Ziel-Server (z.B. W:\...\SQLSources)
# Leer = Ziel-Server-Export in ConfigForm deaktiviert
BasePath =
