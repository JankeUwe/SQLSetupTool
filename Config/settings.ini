# =============================================================================
# SQL Server Setup Tool – Zentrale Konfigurationsdatei
# Stand: April 2025
# =============================================================================

[General]
DefaultVersion      = 2022
DefaultEdition      = Developer
DefaultInstanceName = MSSQLServer
DefaultCollation    = Latin1_General_CI_AS
SourceShare         = \\srv\SQLSources

# =============================================================================
[Versions]
# Kommagetrennte Liste verfuegbarer SQL-Server-Versionen (fuellt Version-Combobox)
Available           = 2019,2022,2025

# =============================================================================
[Editions]
# Editionen fuer SQL 2019 und 2022
Standard            = Developer,Standard,Enterprise
# Spezielle Editionen fuer SQL 2025
SQL2025             = Developer-Standard,Developer-Enterprise

# =============================================================================
[Collations]
# Globale Standardsortierung – wird auch als Fallback verwendet wenn collations.txt fehlt
Standard            = Latin1_General_CI_AS
# Domaenenspezifische Vorgaben – erscheinen automatisch an erster Stelle der Combobox
# Format: Domain_<NETBIOSNAME> = <Collation>
Domain_CONTOSO      = Latin1_General_CI_AS
Domain_HLB          = SQL_Latin1_General_CP1_CI_AS
# HINWEIS: Die vollstaendige Auswahlliste wird aus Config\collations.txt gelesen.
#          Zeilen mit # und Leerzeilen werden ignoriert.

# =============================================================================
[SerialNumbers]
# Produktschluessel fuer jede Version+Edition-Kombination
# Format: SQL<Version>_<Edition> = <Key>
# Developer-Editionen benoetigen keinen Key – Wert leer lassen
SQL2019_Developer           =
SQL2019_Standard            = XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
SQL2019_Enterprise          = XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
SQL2022_Developer           =
SQL2022_Standard            = XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
SQL2022_Enterprise          = 2Q48Q-PB48J-DRCVN-GB844-X2H4Q
SQL2025_Developer-Standard  = XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
SQL2025_Developer-Enterprise= XXXXX-XXXXX-XXXXX-XXXXX-XXXXX

# =============================================================================
[DiskLayout_Standard]
# Laufwerksbuchstaben gemaess FI-TS Standard (SQL Server 2022 Enterprise Referenzkonfiguration)
# DataDrive    : Benutzerdatenbankdateien (.mdf, .ndf)
# LogDrive     : Transaktionsprotokolle (.ldf)
# TempDrive    : TempDB-Dateien
# BackupDrive  : SQL Server Backups (auch INSTALLSQLDATADIR fuer System-DBs auf diesem Laufwerk)
# InstallDrive : SQL Server Binaerdateien (Program Files)
DataDrive    = G
LogDrive     = H
TempDrive    = I
BackupDrive  = F
InstallDrive = C

# Domaenenspezifische Laufwerkszuordnung (Beispiel)
# [DiskLayout_CONTOSO]
# DataDrive    = F
# LogDrive     = G
# TempDrive    = H
# BackupDrive  = I
# InstallDrive = C

# =============================================================================
[Paths]
# Unterverzeichnis-Teile der SQL-Pfade – werden mit Laufwerksbuchstabe kombiniert
# Vollstaendiger Pfad: <Drive>:\<SubPath>  (ohne InstSuffix)  oder  <Drive>:\<SubPath>\<InstSuffix>\DATA|LOG
InstallSubPath = Program Files\Microsoft SQL Server
# SysDbSubPath: Verzeichnis fuer System-Datenbanken (master, model, msdb) auf BackupDrive
# Entspricht INSTALLSQLDATADIR in der SQL-Setup-INI  -> F:\Microsoft SQL Server
SysDbSubPath   = Microsoft SQL Server
BackupSubPath  = Daten\SQL\Backup
DataSubPath    = Daten\SQL
TempSubPath    = Daten\SQL
LogSubPath     = Daten\SQL

# =============================================================================
[Installation]
# SQL Server Features – werden direkt als Feature-Array an Install-DbaInstance uebergeben.
# Entspricht Features=SQLENGINE,FULLTEXT,IS in der SQL-Setup-INI.
# Gueltige Werte: Engine, FullText, Replication, IS, AS, RS, Tools, MDS
Features            = Engine,FullText,IS

# Instant File Initialization (SqlSvcInstantFileInit=True)
# Erfordert lokale Sicherheitsrichtlinie "Volumewartungsaufgaben ausfuehren"
InstantFileInit     = true

# Initiale sysadmin-Konten bei der Installation (SqlSysAdminAccounts)
# Separate Eintraege mit Komma. AD-Gruppen werden spaeter via [SysadminGroups] zugewiesen.
SysAdminAccounts    = BUILTIN\Administrators

# TempDB-Initialkonfiguration – wird direkt beim SQL-Setup gesetzt (SQLTEMPDB* Parameter)
# PostInstall optimiert die Dateianzahl spaeter anhand der CPU-Anzahl.
TempDbFileCount     = 2
TempDbFileSizeMB    = 1024
TempDbFileGrowthMB  = 512
TempDbLogFileSizeMB = 1024
TempDbLogGrowthMB   = 512

# Netzwerkprotokolle (TcpEnabled=1, NPEnabled=0 aus SQL-Setup-INI)
TcpEnabled          = true
NpEnabled           = false

# SQL Browser Service deaktivieren (BrowserSvcStartUpType=Disabled)
BrowserSvcDisabled  = true

# =============================================================================
[dbaTools]
# Basisverzeichnis auf dem Share.
# Darunter werden automatisch zwei Unterordner erwartet:
#   <ShareBasePath>\dbatools          – Hauptmodul
#   <ShareBasePath>\dbatools.library  – Unterstuetzungsbibliothek (ab dbaTools 2.x)
# Beide Ordner muessen vollstaendig entpackt vorliegen.
# Ist ShareBasePath leer oder nicht erreichbar, wird auf die PowerShell Gallery zurueckgegriffen.
ShareBasePath = W:\75084-Datenbanken\MSSQL\CCM\_MSSQL_GUI\01_PreInstall
ModuleName    = dbatools

# =============================================================================
[Maintenance]
; Lokaler Fallback-Pfad fuer Ola Hallengren Maintenance Solution
; Leer lassen = nur GitHub-Download. Pfad angeben wenn kein Internet verfuegbar.
; Beispiel: OlaSourcePath = \\srv\Tools\OlaHallengren
OlaSourcePath =

[sqmSQLTool]
# Basisverzeichnis auf dem Share.
# Darunter wird das Verzeichnis sqmSQLTool erwartet:
#   <ShareBasePath>\sqmSQLTool\sqmSQLTool.psd1
# Entwicklung: C:\CCM  (Modul liegt lokal, wird in Modulpfad kopiert)
# Produktion:  W:\75084-Datenbanken\MSSQL\CCM\DTC
ShareBasePath = C:\CCM
ModuleName    = sqmSQLTool

# =============================================================================
[PostInstall]
# Splunk Universal Forwarder nach der Installation konfigurieren?
# true  = Invoke-sqmSplunkConfiguration wird im Post-Install ausgefuehrt
# false = Splunk-Konfiguration wird uebersprungen
SplunkEnabled  = false

# Firmen-SQL-Skripte nach der Installation ausfuehren?
# Alle *.sql-Dateien im angegebenen Ordner werden alphabetisch ausgefuehrt.
# Leer lassen = <SourceShare>\Scripts wird automatisch verwendet (wenn vorhanden).
# Expliziter Pfad: z.B. \\srv\SQLSources\Scripts oder C:\SQLSetup\Scripts
SqlScriptsPath =

# =============================================================================
[SysadminGroups]
# AD-Gruppen die nach der Installation zur sysadmin-Rolle hinzugefuegt werden.
# Format: Domain_<NETBIOSNAME> = <Gruppe1>,<Gruppe2>,...
# Standard = Fallback wenn keine Domaene erkannt oder kein Domaenen-Eintrag vorhanden.
# Leer lassen: keine Gruppe zuweisen - SA-Obfuscation wird dann uebersprungen.
Domain_CONTOSO = CONTOSO\Rg_SQL_Sysadmin
Domain_HLB     = HLB\Fg_DC_SqlAdminAll_Mod
Standard       =

# =============================================================================
[Monitoring]
Enabled        = true
DefaultType    = 1
Domain_CONTOSO = 2
Types          = Kein Monitoring,Service Monitoring,Vollstaendiges Monitoring

# =============================================================================
[OptionalComponents]
SSRS_Enabled    = true
SSRS_SourcePath = \\srv\SSRS
SSAS_Enabled    = true
SSMS_Enabled    = true
SSIS_Enabled    = true
TDP_Enabled     = true
TDP_SourcePath  =

# =============================================================================
[Drivers]
# Treiber-Installation nach SQL-Setup (JDBC / ODBC / DB2)
# *_Enabled = true  -> Checkbox im GUI anzeigen
# *_SourcePath      -> Quellpfad fuer den Installer (leer = Checkbox disabled)
JDBC_Enabled        = false
ODBC_Enabled        = true
DB2_Enabled         = false
JDBC_SourcePath     =
ODBC_SourcePath     =
DB2_SourcePath      =

# =============================================================================
[Ports]
# TCP-Port-Konfiguration (wird nach der Installation via Set-sqmTcpPort gesetzt)
# Default-Instanz (MSSQLSERVER): BasePort
# Named Instance N:              BasePort + (N * PortIncrement)
BasePort            = 1433
BrowserPort         = 1434
PortIncrement       = 10

# =============================================================================
[PreInstall]
# Vorab-Pruefungen vor der SQL-Installation
# Format64kCheck = true  -> NTFS-Allokationseinheit aller konfigurierten Laufwerke pruefen
#                           Bei Abweichung: Dialog mit OK/Abbrechen (kein Auto-Format)
Format64kCheck      = true
# SnapshotEnabled = true -> Hinweis-Dialog "Snapshot empfohlen, bitte manuell durchfuehren"
#                           Kein automatisches Checkpoint (Platzhalter fuer spaeteres Release)
SnapshotEnabled     = false




